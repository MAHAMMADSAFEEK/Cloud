<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ops Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;}
:root{--bg:#0f1117;--bg2:#181c27;--surface:#1e2336;--surface2:#252b40;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f2f8;--muted:#8b92b0;--accent:#4f8ef7;--radius:10px;--radius-lg:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.logo{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
#status-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(245,166,35,0.15);color:#f5a623;border:1px solid rgba(245,166,35,0.3);}
#last-updated{font-size:11px;color:var(--muted);}
.btn-refresh{font-size:12px;padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-refresh:hover{background:#3a7de0;}
.btn-refresh.spinning i{animation:spin 0.8s linear infinite;}
/* GLOBAL FILTER BAR */
.filter-topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:49px;z-index:99;}
.filter-topbar label{font-size:11px;color:var(--muted);white-space:nowrap;}
.filter-topbar select,.filter-topbar input[type=date]{font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;outline:none;height:30px;}
.clr-btn{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;height:30px;white-space:nowrap;}
.clr-btn:hover{color:var(--text);border-color:var(--accent);}
.filter-divider{width:1px;height:20px;background:var(--border2);margin:0 4px;}
/* MAIN */
.main{padding:20px 24px;width:100%;}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:4px;margin-bottom:20px;overflow-x:auto;}
.tab{font-size:13px;padding:7px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.tab.active{background:var(--surface);color:var(--text);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden;}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--mc,var(--accent));}
.metric .micon{font-size:18px;color:var(--mc,var(--accent));margin-bottom:6px;}
.metric .mlbl{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em;}
.metric .mval{font-size:28px;font-weight:600;line-height:1;}
.metric .msub{font-size:10px;color:var(--muted);margin-top:4px;}
/* CARDS & CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;}
.card-title{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title i{color:var(--accent);font-size:15px;}
/* TABLE */
.table-wrap{overflow-x:auto;width:100%;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);padding:8px 12px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.bg{background:rgba(52,201,138,0.15);color:#34c98a;border:1px solid rgba(52,201,138,0.25);}
.bb{background:rgba(79,142,247,0.15);color:#4f8ef7;border:1px solid rgba(79,142,247,0.25);}
.br{background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.25);}
.bo{background:rgba(245,166,35,0.15);color:#f5a623;border:1px solid rgba(245,166,35,0.25);}
.bp{background:rgba(155,109,255,0.15);color:#9b6dff;border:1px solid rgba(155,109,255,0.25);}
/* PROGRESS BARS */
.pr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pr-lbl{font-size:12px;min-width:130px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pr-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;}
.pr-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.pr-cnt{font-size:12px;color:var(--muted);min-width:28px;text-align:right;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0;}
.empty{text-align:center;color:var(--muted);padding:32px;font-size:13px;}
/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(15,17,23,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;}
#overlay.hidden{display:none;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay-txt{font-size:14px;color:var(--muted);}
.active-filters{font-size:11px;color:var(--accent);padding:2px 8px;background:rgba(79,142,247,0.1);border-radius:20px;border:1px solid rgba(79,142,247,0.2);}
@media(max-width:600px){.main{padding:12px;}.topbar{padding:10px 14px;}.filter-topbar{top:45px;padding:8px 14px;}}
</style>
</head>
<body>

<div id="overlay">
  <div class="spin"></div>
  <div id="overlay-txt">Connecting to Google Sheets…</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo"><i class="ti ti-bolt"></i> Ops Dashboard</div>
    <span style="font-size:11px;color:var(--muted);">PE · Attendance · TBT · DPR</span>
  </div>
  <div class="topbar-right">
    <span id="status-badge">Loading…</span>
    <span id="last-updated"></span>
    <button class="btn-refresh" onclick="loadAll()"><i class="ti ti-refresh"></i> Refresh</button>
  </div>
</div>

<!-- GLOBAL FILTER BAR -->
<div class="filter-topbar">
  <i class="ti ti-filter" style="color:var(--accent);font-size:14px;"></i>
  <label>Date</label>
  <input type="date" id="g-date" onchange="applyFilters()">
  <div class="filter-divider"></div>
  <label>Dept</label>
  <select id="g-dept" onchange="applyFilters()"><option value="">All</option></select>
  <label>Region</label>
  <select id="g-region" onchange="applyFilters()"><option value="">All</option></select>
  <label>Cluster</label>
  <select id="g-cluster" onchange="applyFilters()"><option value="">All</option></select>
  <label>City Mgr</label>
  <select id="g-city" onchange="applyFilters()"><option value="">All</option></select>
  <div class="filter-divider"></div>
  <label>Visit Status</label>
  <select id="g-vstatus" onchange="applyFilters()"><option value="">All</option></select>
  <button class="clr-btn" onclick="clearFilters()"><i class="ti ti-x"></i> Clear</button>
  <span id="filter-indicator" style="display:none;" class="active-filters"></span>
</div>

<!-- MAIN DASHBOARD -->
<div class="main" id="main" style="display:none;">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pe',this)"><i class="ti ti-users"></i> PE Overview</button>
    <button class="tab" onclick="switchTab('att',this)"><i class="ti ti-calendar-check"></i> Attendance</button>
    <button class="tab" onclick="switchTab('tbt',this)"><i class="ti ti-clipboard-list"></i> TBT</button>
    <button class="tab" onclick="switchTab('dpr',this)"><i class="ti ti-file-report"></i> DPR</button>
  </div>

  <!-- PE TAB -->
  <div id="tab-pe" class="tab-content active">
    <div class="section-title">PE Summary</div>
    <div class="metrics" id="pe-metrics"></div>
    <div class="card">
      <div class="card-title"><i class="ti ti-table"></i> All Project Engineers</div>
      <div class="table-wrap"><table><thead id="pe-head"></thead><tbody id="pe-body"></tbody></table></div>
    </div>
  </div>

  <!-- ATTENDANCE TAB -->
  <div id="tab-att" class="tab-content">
    <div class="section-title">Attendance Summary</div>
    <div class="metrics" id="att-metrics"></div>
    <div class="charts-grid">
      <div class="card"><div class="card-title"><i class="ti ti-building"></i> Project-wise Visits</div><div id="proj-bars"></div></div>
      <div class="card"><div class="card-title"><i class="ti ti-user-check"></i> PE Visit Count</div><div id="pe-visit-bars"></div></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-list-details"></i> Attendance Log</div>
      <div class="table-wrap"><table><thead id="att-head"></thead><tbody id="att-body"></tbody></table></div>
    </div>
  </div>

  <!-- TBT TAB -->
  <div id="tab-tbt" class="tab-content">
    <div class="section-title">TBT Summary</div>
    <div class="metrics" id="tbt-metrics"></div>
    <div class="charts-grid">
      <div class="card"><div class="card-title"><i class="ti ti-users-group"></i> Vendor-wise TBT</div><div id="tbt-bars"></div></div>
      <div class="card"><div class="card-title"><i class="ti ti-mail"></i> Mail Status</div><div id="tbt-mail-bars"></div></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-list-details"></i> TBT Log</div>
      <div class="table-wrap"><table><thead id="tbt-head"></thead><tbody id="tbt-body"></tbody></table></div>
    </div>
  </div>

  <!-- DPR TAB -->
  <div id="tab-dpr" class="tab-content">
    <div class="section-title">DPR Summary</div>
    <div class="metrics" id="dpr-metrics"></div>
    <div class="charts-grid">
      <div class="card"><div class="card-title"><i class="ti ti-chart-bar"></i> Completion Buckets</div><div id="dpr-bars"></div></div>
      <div class="card"><div class="card-title"><i class="ti ti-alert-triangle"></i> Issues Reported</div><div id="dpr-issue-bars"></div></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-list-details"></i> DPR Log</div>
      <div class="table-wrap"><table><thead id="dpr-head"></thead><tbody id="dpr-body"></tbody></table></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SID='1NuqbG_4a3bGS4Wd6dKvxsP0FN2tE6yMupkQ-1fYDQNA';
const SHEETS={pe:'819368336',att:'1499073248',tbt:'1641565259',dpr:'351032265'};
let D={pe:{h:[],r:[]},att:{h:[],r:[]},tbt:{h:[],r:[]},dpr:{h:[],r:[]}};

// ── Helpers ───────────────────────────────────────────────────
const csvUrl=gid=>`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${gid}`;
function ci(headers,...kws){for(const kw of kws){const i=headers.findIndex(h=>h.toLowerCase().replace(/[\s\-_]/g,'').includes(kw.toLowerCase().replace(/[\s\-_]/g,'')));if(i>=0)return i;}return -1;}
const v=(row,i)=>i>=0?(row[i]||'').trim():'';
function parseSheet(gid){return new Promise((res,rej)=>{Papa.parse(csvUrl(gid),{download:true,header:false,skipEmptyLines:true,complete:r=>{if(r.data.length<1)rej('Empty');else res(r.data);},error:e=>rej(e)});});}
function setOverlay(txt){document.getElementById('overlay-txt').textContent=txt;}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-'+name).classList.add('active');}
function fillSel(id,vals){const s=document.getElementById(id);if(!s)return;const cur=s.value;while(s.options.length>1)s.remove(1);[...new Set(vals)].filter(Boolean).sort().forEach(val=>{const o=document.createElement('option');o.value=val;o.textContent=val;if(val===cur)o.selected=true;s.appendChild(o);});}
function metric(icon,lbl,val,sub,color){return `<div class="metric" style="--mc:${color}"><div class="micon"><i class="ti ${icon}"></i></div><div class="mlbl">${lbl}</div><div class="mval">${val}</div>${sub?`<div class="msub">${sub}</div>`:''}</div>`;}
function bars(data,color){if(!data.length)return'<div class="empty">No data</div>';const m=data[0][1]||1;return data.map(([lbl,n])=>`<div class="pr-row"><div class="pr-lbl" title="${lbl}">${lbl}</div><div class="pr-track"><div class="pr-fill" style="width:${Math.round(n/m*100)}%;background:${color}"></div></div><div class="pr-cnt">${n}</div></div>`).join('');}

// ── Date Matching ─────────────────────────────────────────────
function dateMatch(cellVal, filterDate) {
  if (!filterDate) return true;
  const d = cellVal.trim();
  // Try DD/MM/YYYY
  const parts = d.split('/');
  if (parts.length === 3) {
    const iso = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    return iso === filterDate;
  }
  // Try YYYY-MM-DD or contains filterDate
  return d.includes(filterDate) || d === filterDate;
}

// ── Get filtered attendance rows ──────────────────────────────
function getFilteredAtt() {
  const ah=D.att.h, ar=D.att.r;
  const EI=ci(ah,'UserEmail','email'), DI=ci(ah,'Date'),
        PI=ci(ah,'ProjectName','project'), CI=ci(ah,'CheckinTime','checkin'),
        OI=ci(ah,'CheckoutTime','checkout'), LI=ci(ah,'CheckinLocation','location'),
        VSI=ci(ah,'VisitStatus','status'), RI=ci(ah,'Remark','remark');

  const fDate=document.getElementById('g-date').value;
  const fStatus=document.getElementById('g-vstatus').value;

  // Get PE emails matching PE filters
  const peEmails = getFilteredPEEmails();

  return {
    rows: ar.filter(x=>{
      if (peEmails !== null && !peEmails.has(v(x,EI).toLowerCase())) return false;
      if (fStatus && v(x,VSI) !== fStatus) return false;
      if (fDate && !dateMatch(v(x,DI), fDate)) return false;
      return true;
    }),
    EI,DI,PI,CI,OI,LI,VSI,RI
  };
}

// ── Get filtered PE emails based on PE filters ────────────────
function getFilteredPEEmails() {
  const h=D.pe.h, r=D.pe.r;
  if (!r.length) return null;
  const EI=ci(h,'Mailid','email','mail');
  const DI=ci(h,'Dept','department');
  const RI=ci(h,'Region');
  const CLI=ci(h,'Clusterhead','cluster');
  const CMI=ci(h,'CityManager','city');

  const fd=document.getElementById('g-dept').value;
  const fr=document.getElementById('g-region').value;
  const fc=document.getElementById('g-cluster').value;
  const fm=document.getElementById('g-city').value;

  if (!fd && !fr && !fc && !fm) return null; // no PE filter

  const filtered = r.filter(x=>{
    if(fd && v(x,DI)!==fd) return false;
    if(fr && v(x,RI)!==fr) return false;
    if(fc && v(x,CLI)!==fc) return false;
    if(fm && v(x,CMI)!==fm) return false;
    return true;
  });
  return new Set(filtered.map(x=>v(x,EI).toLowerCase()));
}

// ── Apply all filters ─────────────────────────────────────────
function applyFilters() {
  updateFilterIndicator();
  buildAll();
}

function clearFilters() {
  ['g-date','g-dept','g-region','g-cluster','g-city','g-vstatus'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  applyFilters();
}

function updateFilterIndicator() {
  const active = ['g-date','g-dept','g-region','g-cluster','g-city','g-vstatus'].filter(id=>{
    const el=document.getElementById(id);return el&&el.value;
  });
  const ind=document.getElementById('filter-indicator');
  if(active.length){ind.style.display='inline';ind.textContent=`${active.length} filter${active.length>1?'s':''} active`;}
  else{ind.style.display='none';}
}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('overlay').classList.remove('hidden');
  document.querySelector('.btn-refresh').classList.add('spinning');
  try{
    for(const [key,gid] of Object.entries(SHEETS)){
      const labels={pe:'PE Master',att:'Attendance Tracker',tbt:'TBT',dpr:'DPR'};
      setOverlay(`Loading ${labels[key]}…`);
      try{const rows=await parseSheet(gid);D[key].h=rows[0]||[];D[key].r=rows.slice(1);}
      catch(e){console.warn(`Failed: ${key}`,e);D[key].h=[];D[key].r=[];}
    }
    // Fill global filter dropdowns
    const ph=D.pe.h,pr=D.pe.r;
    fillSel('g-dept',pr.map(x=>v(x,ci(ph,'Dept','department'))));
    fillSel('g-region',pr.map(x=>v(x,ci(ph,'Region'))));
    fillSel('g-cluster',pr.map(x=>v(x,ci(ph,'Clusterhead','cluster'))));
    fillSel('g-city',pr.map(x=>v(x,ci(ph,'CityManager','city'))));
    fillSel('g-vstatus',D.att.r.map(x=>v(x,ci(D.att.h,'VisitStatus','status'))));

    buildAll();
    document.getElementById('main').style.display='block';
    document.getElementById('status-badge').innerHTML='<i class="ti ti-circle-check" style="font-size:10px"></i> Live';
    document.getElementById('status-badge').style.cssText='font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(52,201,138,0.15);color:#34c98a;border:1px solid rgba(52,201,138,0.3);';
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('status-badge').innerHTML='Error';
    document.getElementById('status-badge').style.cssText='font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.3);';
  }finally{document.getElementById('overlay').classList.add('hidden');document.querySelector('.btn-refresh').classList.remove('spinning');}
}

function buildAll(){buildPE();buildAtt();buildTBT();buildDPR();}

// ── PE ────────────────────────────────────────────────────────
function buildPE(){
  const h=D.pe.h,r=D.pe.r;
  const NI=ci(h,'EmployeeName','name'),SI=ci(h,'SSEID','sse'),EI=ci(h,'Mailid','email','mail'),
        DI=ci(h,'Dept','department'),RI=ci(h,'Region'),CLI=ci(h,'Clusterhead','cluster'),CMI=ci(h,'CityManager','city');

  const fd=document.getElementById('g-dept').value;
  const fr=document.getElementById('g-region').value;
  const fc=document.getElementById('g-cluster').value;
  const fm=document.getElementById('g-city').value;

  const filteredPE = r.filter(x=>{
    if(fd&&v(x,DI)!==fd)return false;
    if(fr&&v(x,RI)!==fr)return false;
    if(fc&&v(x,CLI)!==fc)return false;
    if(fm&&v(x,CMI)!==fm)return false;
    return true;
  });

  // Get filtered attendance
  const {rows:filtAtt,EI:AEI,CI:ACI,OI:AOI} = getFilteredAtt();
  const attCols = D.att.h;
  const _AEI=ci(attCols,'UserEmail','email'),_ACI=ci(attCols,'CheckinTime','checkin'),_AOI=ci(attCols,'CheckoutTime','checkout');

  const ciEmails=new Set(filtAtt.filter(x=>v(x,_ACI)).map(x=>v(x,_AEI).toLowerCase()));
  const fullEmails=new Set(filtAtt.filter(x=>v(x,_ACI)&&v(x,_AOI)).map(x=>v(x,_AEI).toLowerCase()));
  const visitMap={};filtAtt.forEach(x=>{const e=v(x,_AEI).toLowerCase();visitMap[e]=(visitMap[e]||0)+1;});

  const TUI=ci(D.tbt.h,'Uniqueid','unique'),DUI=ci(D.dpr.h,'UniqueID','unique');
  const tbtIds=new Set(D.tbt.r.map(x=>v(x,TUI)).filter(Boolean));
  const dprIds=new Set(D.dpr.r.map(x=>v(x,DUI)).filter(Boolean));

  const total=filteredPE.length;
  const ci_=filteredPE.filter(x=>ciEmails.has(v(x,EI).toLowerCase())).length;
  const full=filteredPE.filter(x=>fullEmails.has(v(x,EI).toLowerCase())).length;

  document.getElementById('pe-metrics').innerHTML=
    metric('ti-users','Total PEs',total,'Filtered','#4f8ef7')+
    metric('ti-login','Checked In',ci_,`${total?Math.round(ci_/total*100):0}% of PEs`,'#34c98a')+
    metric('ti-circle-check','Full Attendance',full,'Check-in + Check-out','#9b6dff')+
    metric('ti-user-off','Absent',total-ci_,'No check-in','#e74c3c')+
    metric('ti-clipboard-list','TBT Leads',tbtIds.size,'Unique submissions','#f5a623')+
    metric('ti-file-report','DPR Leads',dprIds.size,'Unique submissions','#34c98a');

  document.getElementById('pe-head').innerHTML='<tr><th>#</th><th>Name</th><th>SSE ID</th><th>Dept</th><th>Region</th><th>Cluster</th><th>City Mgr</th><th>Attendance</th><th>Visits</th><th>TBT</th><th>DPR</th></tr>';
  const tbody=document.getElementById('pe-body');
  if(!filteredPE.length){tbody.innerHTML='<tr><td colspan="11" class="empty">No records</td></tr>';return;}
  tbody.innerHTML=filteredPE.map((x,i)=>{
    const email=v(x,EI).toLowerCase(),hasFull=fullEmails.has(email),hasIn=ciEmails.has(email);
    const attB=hasFull?'<span class="badge bg">Full</span>':hasIn?'<span class="badge bb">Check-in</span>':'<span class="badge br">Absent</span>';
    const name=v(x,NI)||'—',init=name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(),sse=v(x,SI);
    return `<tr><td style="color:var(--muted)">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${init}</div>
      <div><div style="font-weight:500;font-size:13px">${name}</div>
      <div style="font-size:11px;color:var(--muted)">${v(x,EI)}</div></div></div></td>
      <td><span class="badge bp">${sse||'—'}</span></td>
      <td>${v(x,DI)||'—'}</td><td>${v(x,RI)||'—'}</td>
      <td style="font-size:12px">${v(x,CLI)||'—'}</td>
      <td style="font-size:12px">${v(x,CMI)||'—'}</td>
      <td>${attB}</td><td><span class="badge bb">${visitMap[email]||0}</span></td>
      <td>${tbtIds.has(sse)?'<span class="badge bg">✓</span>':'<span class="badge br">✗</span>'}</td>
      <td>${dprIds.has(sse)?'<span class="badge bg">✓</span>':'<span class="badge br">✗</span>'}</td></tr>`;
  }).join('');
}

// ── Attendance ────────────────────────────────────────────────
function buildAtt(){
  const {rows,EI,DI,PI,CI,OI,LI,VSI,RI} = getFilteredAtt();
  const total=rows.length,withIn=rows.filter(x=>v(x,CI)).length,
        withFull=rows.filter(x=>v(x,CI)&&v(x,OI)).length,
        uPE=new Set(rows.map(x=>v(x,EI))).size,uProj=new Set(rows.map(x=>v(x,PI))).size;

  document.getElementById('att-metrics').innerHTML=
    metric('ti-calendar','Total Visits',total,'Filtered records','#4f8ef7')+
    metric('ti-users','Unique PEs',uPE,'With any visit','#34c98a')+
    metric('ti-login','Check-ins',withIn,`${total?Math.round(withIn/total*100):0}%`,'#9b6dff')+
    metric('ti-circle-check','Full (In+Out)',withFull,`${total?Math.round(withFull/total*100):0}%`,'#f5a623')+
    metric('ti-building','Projects',uProj,'Unique','#e74c3c');

  const pm={};rows.forEach(x=>{const p=v(x,PI)||'Unknown';pm[p]=(pm[p]||0)+1;});
  document.getElementById('proj-bars').innerHTML=bars(Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,12),'#4f8ef7');
  const em={};rows.forEach(x=>{const e=v(x,EI)||'Unknown';em[e]=(em[e]||0)+1;});
  document.getElementById('pe-visit-bars').innerHTML=bars(Object.entries(em).sort((a,b)=>b[1]-a[1]).slice(0,12),'#34c98a');

  document.getElementById('att-head').innerHTML='<tr><th>#</th><th>Email</th><th>Date</th><th>Project</th><th>Check-in</th><th>Check-out</th><th>Location</th><th>Status</th><th>Remarks</th></tr>';
  const tbody=document.getElementById('att-body');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="9" class="empty">No records found</td></tr>';return;}
  tbody.innerHTML=rows.slice(0,300).map((x,i)=>{
    const cin=v(x,CI),cout=v(x,OI),st=v(x,VSI);
    const sb=cin&&cout?'<span class="badge bg">Complete</span>':cin?'<span class="badge bb">In only</span>':'<span class="badge br">Absent</span>';
    return `<tr><td style="color:var(--muted)">${i+1}</td>
      <td style="font-size:12px">${v(x,EI)||'—'}</td>
      <td><span class="badge bb">${v(x,DI)||'—'}</span></td>
      <td style="font-size:12px">${v(x,PI)||'—'}</td>
      <td style="font-size:12px">${cin||'—'}</td><td style="font-size:12px">${cout||'—'}</td>
      <td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis">${v(x,LI)||'—'}</td>
      <td>${st?`<span class="badge bb">${st}</span>`:sb}</td>
      <td style="font-size:11px;color:var(--muted)">${v(x,RI)||'—'}</td></tr>`;
  }).join('');
  if(rows.length>300)tbody.innerHTML+=`<tr><td colspan="9" style="text-align:center;color:var(--muted);font-size:12px;padding:10px">Showing 300 of ${rows.length}</td></tr>`;
}

// ── TBT ──────────────────────────────────────────────────────
function buildTBT(){
  const h=D.tbt.h,r=D.tbt.r;
  const VI=ci(h,'Vendor','IC','I&C'),TI=ci(h,'Topic'),TEI=ci(h,'Technician'),HI=ci(h,'Helper'),
        TSI=ci(h,'Timestamp','time'),UI=ci(h,'Uniqueid','unique'),RI2=ci(h,'TBTReport','report'),MSI=ci(h,'Mailstatus','mail');
  const total=r.length,uIds=new Set(r.map(x=>v(x,UI)).filter(Boolean)).size,
        totTech=r.reduce((s,x)=>s+(parseInt(v(x,TEI))||0),0),
        totHelp=r.reduce((s,x)=>s+(parseInt(v(x,HI))||0),0),
        withRep=r.filter(x=>v(x,RI2)).length,
        mailSent=r.filter(x=>(v(x,MSI)||'').toLowerCase().includes('sent')).length;
  document.getElementById('tbt-metrics').innerHTML=
    metric('ti-clipboard-list','Total TBT',total,'Sessions','#4f8ef7')+
    metric('ti-id','Unique IDs',uIds,'PE submissions','#34c98a')+
    metric('ti-tool','Technicians',totTech,'Total','#9b6dff')+
    metric('ti-users','Helpers',totHelp,'Total','#f5a623')+
    metric('ti-file-check','With Report',withRep,`of ${total}`,'#e74c3c')+
    metric('ti-send','Mail Sent',mailSent,`of ${total}`,'#34c98a');
  const vm={};r.forEach(x=>{const vv=v(x,VI)||'Unknown';vm[vv]=(vm[vv]||0)+1;});
  document.getElementById('tbt-bars').innerHTML=bars(Object.entries(vm).sort((a,b)=>b[1]-a[1]).slice(0,10),'#9b6dff');
  const mm={'Sent':0,'Pending':0};r.forEach(x=>{if((v(x,MSI)||'').toLowerCase().includes('sent'))mm['Sent']++;else mm['Pending']++;});
  document.getElementById('tbt-mail-bars').innerHTML=bars([['Sent',mm.Sent],['Pending',mm.Pending]],'#4f8ef7');
  document.getElementById('tbt-head').innerHTML='<tr><th>#</th><th>Unique ID</th><th>Vendor</th><th>Topic</th><th>Tech</th><th>Helpers</th><th>Timestamp</th><th>Report</th><th>Mail</th></tr>';
  const tbody=document.getElementById('tbt-body');
  if(!r.length){tbody.innerHTML='<tr><td colspan="9" class="empty">No TBT records</td></tr>';return;}
  tbody.innerHTML=r.slice(0,300).map((x,i)=>`<tr>
    <td style="color:var(--muted)">${i+1}</td>
    <td><span class="badge bp">${v(x,UI)||'—'}</span></td>
    <td style="font-size:12px">${v(x,VI)||'—'}</td>
    <td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${v(x,TI)||'—'}</td>
    <td>${v(x,TEI)||'0'}</td><td>${v(x,HI)||'0'}</td>
    <td style="font-size:11px">${v(x,TSI)||'—'}</td>
    <td>${v(x,RI2)?'<span class="badge bg">✓ Yes</span>':'<span class="badge br">✗ No</span>'}</td>
    <td>${v(x,MSI)?`<span class="badge bb">${v(x,MSI)}</span>`:'<span class="badge bo">Pending</span>'}</td>
  </tr>`).join('');
}

// ── DPR ──────────────────────────────────────────────────────
function buildDPR(){
  const h=D.dpr.h,r=D.dpr.r;
  const CII=ci(h,'ChildID','child'),PI=ci(h,'WorkPlan','plan','work'),MPI=ci(h,'Manpower'),
        PCI=ci(h,'%','completion','percent'),ISI=ci(h,'Issues','challenges'),
        RI=ci(h,'Remarks','remark'),TSI=ci(h,'Timestamp','time'),UI=ci(h,'UniqueID','unique');
  const total=r.length,uIds=new Set(r.map(x=>v(x,UI)).filter(Boolean)).size,
        totMP=r.reduce((s,x)=>s+(parseInt(v(x,MPI))||0),0),
        withIss=r.filter(x=>{const i=v(x,ISI).toLowerCase();return i&&i!=='no'&&i!=='none'&&i!=='na';}).length;
  const pcts=r.map(x=>parseFloat(v(x,PCI))||0).filter(n=>n>0);
  const avg=pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;
  document.getElementById('dpr-metrics').innerHTML=
    metric('ti-file-report','Total DPR',total,'Reports','#4f8ef7')+
    metric('ti-id','Unique IDs',uIds,'PE submissions','#34c98a')+
    metric('ti-users','Manpower',totMP,'Total','#9b6dff')+
    metric('ti-percentage','Avg Completion',avg+'%','Across DPRs','#f5a623')+
    metric('ti-alert-triangle','With Issues',withIss,`of ${total}`,'#e74c3c');
  const buckets=[['0–25%',0],['26–50%',0],['51–75%',0],['76–100%',0]];
  r.forEach(x=>{const p=parseFloat(v(x,PCI))||0;if(p<=25)buckets[0][1]++;else if(p<=50)buckets[1][1]++;else if(p<=75)buckets[2][1]++;else buckets[3][1]++;});
  const bC=['#e74c3c','#f5a623','#4f8ef7','#34c98a'],maxB=Math.max(...buckets.map(b=>b[1]))||1;
  document.getElementById('dpr-bars').innerHTML=buckets.map(([l,n],i)=>`<div class="pr-row"><div class="pr-lbl">${l}</div><div class="pr-track"><div class="pr-fill" style="width:${Math.round(n/maxB*100)}%;background:${bC[i]}"></div></div><div class="pr-cnt">${n}</div></div>`).join('');
  const im={};r.forEach(x=>{const iss=v(x,ISI);if(iss&&iss.toLowerCase()!=='no'&&iss.toLowerCase()!=='none'&&iss.toLowerCase()!=='na'){const k=iss.slice(0,35);im[k]=(im[k]||0)+1;}});
  const topI=Object.entries(im).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('dpr-issue-bars').innerHTML=topI.length?bars(topI,'#e74c3c'):'<div class="empty" style="padding:16px;font-size:13px;">No issues reported</div>';
  document.getElementById('dpr-head').innerHTML='<tr><th>#</th><th>Unique ID</th><th>Child ID</th><th>Work Plan</th><th>Manpower</th><th>Completion</th><th>Issues</th><th>Remarks</th><th>Timestamp</th></tr>';
  const tbody=document.getElementById('dpr-body');
  if(!r.length){tbody.innerHTML='<tr><td colspan="9" class="empty">No DPR records</td></tr>';return;}
  tbody.innerHTML=r.slice(0,300).map((x,i)=>{
    const pct=parseFloat(v(x,PCI))||0,pc=pct>=75?'bg':pct>=50?'bb':pct>=25?'bo':'br';
    const iss=v(x,ISI),hasIss=iss&&iss.toLowerCase()!=='no'&&iss.toLowerCase()!=='none'&&iss.toLowerCase()!=='na';
    return `<tr><td style="color:var(--muted)">${i+1}</td>
      <td><span class="badge bp">${v(x,UI)||'—'}</span></td>
      <td style="font-size:11px">${v(x,CII)||'—'}</td>
      <td style="font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis">${v(x,PI)||'—'}</td>
      <td>${v(x,MPI)||'—'}</td>
      <td><span class="badge ${pc}">${pct}%</span></td>
      <td>${hasIss?'<span class="badge br">⚠ Yes</span>':'<span class="badge bg">None</span>'}</td>
      <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis">${v(x,RI)||'—'}</td>
      <td style="font-size:11px">${v(x,TSI)||'—'}</td></tr>`;
  }).join('');
}

loadAll();
</script>
